<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crops Database</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; font-size: 12px; background: #f5f5f0; }
h1 { padding: 10px 14px; background: #2A5C20; color: #fff; font-size: 14px; font-weight: bold; }
#info { padding: 4px 14px; background: #e8e4d8; color: #555; font-size: 11px; border-bottom: 1px solid #ccc; }
.wrap { overflow: auto; height: calc(100vh - 52px); }
table { border-collapse: collapse; white-space: nowrap; }
thead th {
  position: sticky; top: 0; z-index: 2;
  background: #2A5C20; color: #fff;
  padding: 5px 8px; text-align: left;
  font-size: 11px; border-right: 1px solid #1e4418;
}
thead th:first-child { position: sticky; left: 0; z-index: 3; }
tbody td {
  padding: 3px 8px; border-bottom: 1px solid #ddd; border-right: 1px solid #eee;
  color: #222; max-width: 300px; overflow: hidden; text-overflow: ellipsis;
}
tbody tr:nth-child(even) td { background: #f9f7f0; }
tbody tr:hover td { background: #e0efd8; }
tbody td:first-child {
  position: sticky; left: 0; z-index: 1;
  background: #fff; font-weight: bold; border-right: 2px solid #bbb;
}
tbody tr:nth-child(even) td:first-child { background: #f9f7f0; }
tbody tr:hover td:first-child { background: #e0efd8; }
#loading { padding: 40px; text-align: center; color: #666; }
</style>
</head>
<body>
<h1>Crops Database</h1>
<div id="info">Loading…</div>
<div class="wrap">
  <div id="loading">Loading crops.json…</div>
  <table id="tbl" style="display:none"><thead id="hd"></thead><tbody id="bd"></tbody></table>
</div>
<script>
const MONTHS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
const NUT_KEYS = ['kcal','protein','fat','carbs','fiber','ca','fe','mg','p','k','na','zn','cu','mn','se','vitA','vitC','vitE','vitK','b1','b2','b3','b6','folate'];

const COLS = [
  {key:'name',          label:'Name'},
  {key:'food_group',    label:'Food group'},
  {key:'edible_part',   label:'Edible part'},
  {key:'perennial',     label:'Perennial',    fn: c => c.perennial ? 'Yes' : 'No'},
  {key:'serve_g',       label:'Serve (g)'},
  {key:'yield_low',     label:'Yield low (t/ha)'},
  {key:'yield_high',    label:'Yield high (t/ha)'},
  {key:'h_max',         label:'H max (m)'},
  {key:'w_max',         label:'W max (m)'},
  {key:'storability',   label:'Storability'},
  {key:'cool_store',    label:'Cool store'},
  {key:'labour_hand',   label:'Labour hand (h/ha)'},
  {key:'labour_mech',   label:'Labour mech (h/ha)'},
  {key:'establishment_years', label:'Est. years'},
  {key:'temp_opt_min',  label:'Temp opt min (°C)'},
  {key:'temp_opt_max',  label:'Temp opt max (°C)'},
  {key:'tmin',          label:'T abs min (°C)'},
  {key:'tmax',          label:'T abs max (°C)'},
  {key:'rain_min',      label:'Rain min (mm)'},
  {key:'rain_max',      label:'Rain max (mm)'},
  {key:'ropmn',         label:'Rain opt min (mm)'},
  {key:'ropmx',         label:'Rain opt max (mm)'},
  {key:'gmin',          label:'GDD min'},
  {key:'gmax',          label:'GDD max'},
  {key:'ktmp',          label:'Kill temp (°C)'},
  {key:'ph_min',        label:'pH min'},
  {key:'ph_max',        label:'pH max'},
  {key:'text_opt',      label:'Soil opt',      fn: c => (c.text_opt||[]).join(', ')},
  {key:'text_tol',      label:'Soil tol',      fn: c => (c.text_tol||[]).join(', ')},
  {key:'cliz',          label:'Climate zones', fn: c => (c.cliz||[]).join(', ')},
  // Months
  ...MONTHS.map(m => ({key:'m_'+m, label:m.charAt(0).toUpperCase()+m.slice(1), fn: c => (c.months||{})[m]||''})),
  // Nutrients
  ...NUT_KEYS.map(k => ({key:'nut_'+k, label:'nut_'+k, fn: c => c.nut && c.nut[k] != null ? c.nut[k] : ''})),
  // Byproducts
  {key:'byproducts', label:'Byproducts', fn: c => (c.byproducts||[]).map(b=>b.edible_part||b.food_group||'').filter(Boolean).join('; ')},
  {key:'notes', label:'Notes'},
];

fetch('crops.json')
  .then(r => r.json())
  .then(crops => {
    crops.sort((a,b) => a.name.localeCompare(b.name));

    // Header
    const hd = document.getElementById('hd');
    hd.innerHTML = '<tr>' + COLS.map(c => `<th>${c.label}</th>`).join('') + '</tr>';

    // Body
    const bd = document.getElementById('bd');
    bd.innerHTML = crops.map(crop =>
      '<tr>' + COLS.map(c => {
        const val = c.fn ? c.fn(crop) : (crop[c.key] ?? '');
        return `<td title="${String(val).replace(/"/g,'&quot;')}">${val}</td>`;
      }).join('') + '</tr>'
    ).join('');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('tbl').style.display = '';
    document.getElementById('info').textContent = `${crops.length} crops · ${COLS.length} columns`;
  })
  .catch(e => {
    document.getElementById('loading').textContent = 'Error loading crops.json: ' + e.message;
  });
</script>
</body>
</html>
